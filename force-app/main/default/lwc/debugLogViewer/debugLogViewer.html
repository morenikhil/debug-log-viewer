<template>
    <lightning-card title="Debug Log Viewer" icon-name="standard:log_event_stream">
        <div slot="actions">
            <lightning-button-group>
                <lightning-button
                    label="Refresh"
                    icon-name="utility:refresh"
                    onclick={handleRefresh}
                    disabled={isLoading}>
                </lightning-button>
                <lightning-button
                    label="Delete Selected"
                    icon-name="utility:delete"
                    variant="destructive-text"
                    onclick={handleDeleteSelected}
                    disabled={hasNoSelection}>
                </lightning-button>
            </lightning-button-group>
        </div>

        <div class="slds-p-horizontal_medium slds-p-bottom_medium">

            <!-- Filter Panel -->
            <c-debug-log-filter
                onfilterchange={handleFilterChange}>
            </c-debug-log-filter>

            <!-- Error Banner -->
            <template if:true={errorMessage}>
                <div class="slds-notify slds-notify_alert slds-alert_error slds-m-top_small" role="alert">
                    <lightning-icon
                        icon-name="utility:error"
                        alternative-text="Error"
                        size="x-small"
                        class="slds-m-right_x-small">
                    </lightning-icon>
                    <h2>{errorMessage}</h2>
                    <button
                        class="slds-button slds-button_icon slds-button_icon-small slds-float_right slds-popover__close"
                        onclick={clearError}
                        title="Close">
                        <lightning-icon icon-name="utility:close" size="x-small"></lightning-icon>
                    </button>
                </div>
            </template>

            <!-- Log Table -->
            <div class="slds-m-top_small slds-scrollable_x">
                <template if:true={isLoading}>
                    <div class="slds-align_absolute-center slds-p-around_large">
                        <lightning-spinner alternative-text="Loading logs..." size="medium"></lightning-spinner>
                    </div>
                </template>

                <template if:false={isLoading}>
                    <template if:true={hasLogs}>
                        <!-- Summary bar -->
                        <div class="slds-grid slds-grid_align-spread slds-p-vertical_x-small">
                            <span class="slds-text-body_small slds-text-color_weak">
                                Showing {displayedCount} of {totalSize} logs
                            </span>
                            <span class="slds-text-body_small slds-text-color_weak">
                                {selectedCount} selected
                            </span>
                        </div>

                        <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_col-bordered dlv-log-table" role="grid">
                            <thead>
                                <tr class="slds-line-height_reset">
                                    <th scope="col" class="slds-text-align_right" style="width:3rem">
                                        <div class="slds-th__action">
                                            <lightning-input
                                                type="checkbox"
                                                label="Select all"
                                                variant="label-hidden"
                                                checked={allSelected}
                                                onchange={handleSelectAll}>
                                            </lightning-input>
                                        </div>
                                    </th>
                                    <th scope="col" onclick={handleSort} data-field="lastModifiedDate" class="dlv-sortable-col">
                                        <div class="slds-th__action slds-text-link_reset">
                                            <span class="slds-truncate">Date/Time</span>
                                            <template if:true={isSortedByDate}>
                                                <lightning-icon
                                                    icon-name={sortIconName}
                                                    size="x-small"
                                                    class="slds-m-left_x-small">
                                                </lightning-icon>
                                            </template>
                                        </div>
                                    </th>
                                    <th scope="col">
                                        <div class="slds-th__action"><span class="slds-truncate">User</span></div>
                                    </th>
                                    <th scope="col">
                                        <div class="slds-th__action"><span class="slds-truncate">Operation</span></div>
                                    </th>
                                    <th scope="col">
                                        <div class="slds-th__action"><span class="slds-truncate">Status</span></div>
                                    </th>
                                    <th scope="col" class="slds-text-align_right">
                                        <div class="slds-th__action"><span class="slds-truncate">Size (bytes)</span></div>
                                    </th>
                                    <th scope="col" class="slds-text-align_right">
                                        <div class="slds-th__action"><span class="slds-truncate">Duration (ms)</span></div>
                                    </th>
                                    <th scope="col">
                                        <div class="slds-th__action"><span class="slds-truncate">Actions</span></div>
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={sortedLogs} for:item="log">
                                    <tr key={log.id}
                                        class={log.rowClass}
                                        onclick={handleRowClick}
                                        data-id={log.id}>
                                        <td class="slds-text-align_right" onclick={stopPropagation}>
                                            <lightning-input
                                                type="checkbox"
                                                label="Select row"
                                                variant="label-hidden"
                                                checked={log.selected}
                                                data-id={log.id}
                                                onchange={handleRowSelect}>
                                            </lightning-input>
                                        </td>
                                        <td>
                                            <span class="slds-truncate" title={log.lastModifiedDate}>
                                                {log.formattedDate}
                                            </span>
                                        </td>
                                        <td>
                                            <span class="slds-truncate" title={log.logUserName}>{log.logUserName}</span>
                                        </td>
                                        <td>
                                            <span class="slds-truncate" title={log.operation}>{log.operation}</span>
                                        </td>
                                        <td>
                                            <lightning-badge
                                                label={log.status}
                                                class={log.statusClass}>
                                            </lightning-badge>
                                        </td>
                                        <td class="slds-text-align_right">
                                            <span class="slds-truncate">{log.logLength}</span>
                                        </td>
                                        <td class="slds-text-align_right">
                                            <span class="slds-truncate">{log.durationMilliseconds}</span>
                                        </td>
                                        <td onclick={stopPropagation}>
                                            <lightning-button-icon
                                                icon-name="utility:preview"
                                                alternative-text="View Log"
                                                title="View Log Body"
                                                size="small"
                                                data-id={log.id}
                                                onclick={handleViewLog}>
                                            </lightning-button-icon>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>

                        <!-- Load More -->
                        <template if:true={canLoadMore}>
                            <div class="slds-align_absolute-center slds-m-top_small">
                                <lightning-button
                                    label="Load More"
                                    onclick={handleLoadMore}
                                    disabled={isLoadingMore}>
                                </lightning-button>
                            </div>
                        </template>
                    </template>

                    <template if:false={hasLogs}>
                        <div class="slds-illustration slds-illustration_small slds-align_absolute-center slds-p-around_large">
                            <lightning-icon icon-name="utility:cases" size="large" class="slds-illustration__svg"></lightning-icon>
                            <div class="slds-illustration__body">
                                <p class="slds-text-body_regular">No debug logs found.</p>
                                <p class="slds-text-body_small slds-text-color_weak">
                                    Adjust filters or ensure debug logging is enabled.
                                </p>
                            </div>
                        </div>
                    </template>
                </template>
            </div>
        </div>
    </lightning-card>

    <!-- Log Detail Modal -->
    <template if:true={isDetailOpen}>
        <c-debug-log-detail
            log-id={selectedLogId}
            onclose={handleDetailClose}>
        </c-debug-log-detail>
    </template>

    <!-- Delete Confirmation Modal -->
    <template if:true={isDeleteConfirmOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2 class="slds-modal__title">Confirm Delete</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <p>Are you sure you want to delete <strong>{selectedCount}</strong> log(s)?
                        This action cannot be undone.</p>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button
                        label="Cancel"
                        onclick={handleDeleteCancel}>
                    </lightning-button>
                    <lightning-button
                        label="Delete"
                        variant="destructive"
                        onclick={handleDeleteConfirm}
                        disabled={isDeleting}>
                    </lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
